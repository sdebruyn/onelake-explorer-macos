name: OneLake
options:
  bundleIdPrefix: dev.debruyn.ofem
  deploymentTarget:
    macOS: "14.0"
  groupSortPosition: top
  generateEmptyDirectories: true
fileGroups:
  - Local.xcconfig.sample
configs:
  Debug: debug
  Release: release
configFiles:
  Debug: Local.xcconfig
  Release: Local.xcconfig
settings:
  base:
    ARCHS: arm64
    # SWIFT_VERSION stays at 5.10 for the app and FPE targets.
    # OfemKit itself builds in Swift 6 mode (swift-tools-version: 6.0) and its
    # CI job runs `swift test` under strict concurrency checking.  The app/FPE
    # targets remain at 5.10 because TOMLKit 0.6.0 is not Sendable-conformant;
    # building those targets in Swift 6 mode produces ~14 errors in TOMLKit's
    # FormatOptions.swift.  The types that cross the OfemKit/app boundary are
    # all value types or already Sendable, so no concurrency violations are
    # suppressed.  See docs/tech-stack.md for a full explanation.
    SWIFT_VERSION: "5.10"
    # MACOSX_DEPLOYMENT_TARGET is intentionally omitted here — XcodeGen
    # derives it from options.deploymentTarget.macOS above ("14.0") and
    # emits the setting automatically. Declaring it twice creates drift risk.
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    GENERATE_INFOPLIST_FILE: NO
    # Xcode 16+ splits Debug builds into a separate `.debug.dylib` for
    # SwiftUI previews. A sandboxed File Provider Extension runs with
    # hardened runtime + library validation, which refuses to load that
    # externally-signed dylib — the extension then never launches and
    # macOS reports the domain as "Sync is not enabled" (FP -2011). We
    # don't use previews, so disable the split for every configuration.
    ENABLE_DEBUG_DYLIB: NO
    # Fallback version for local dev and CI builds (no release tag).
    # Release builds override these via the xcodebuild command line.
    MARKETING_VERSION: "0.0.0-dev"
    CURRENT_PROJECT_VERSION: "0"
  configs:
    Debug:
      # ONLY_ACTIVE_ARCH is Debug-only: faster local incremental builds.
      # Release uses -destination "generic/platform=macOS" which builds all
      # architectures regardless, making this setting redundant there.
      ONLY_ACTIVE_ARCH: YES
# OfemKit is a local Swift Package that houses all engine modules
# (auth, cache, sync, OneLake clients, telemetry). Linked into both the
# host app and the File Provider Extension.
packages:
  OfemKit:
    path: Packages/OfemKit

targets:
  OneLake:
    type: application
    platform: macOS
    sources:
      - path: OneLake
        excludes:
          - "**/*.xcconfig"
          - "**/Info.plist"
          - "**/*.entitlements"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.debruyn.ofem
        PRODUCT_NAME: OneLake
        INFOPLIST_FILE: OneLake/Info.plist
        CODE_SIGN_ENTITLEMENTS: OneLake/OneLake.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        # Release builds pin manual signing to the Developer ID
        # Application cert + the per-target provisioning profile.
        # xcodebuild's command-line conditional-setting syntax
        # (`PROVISIONING_PROFILE_SPECIFIER[bundle.identifier=...]=...`)
        # does not parse, so the mapping has to live in the project
        # file. Debug builds stay on automatic signing for local dev.
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          PROVISIONING_PROFILE_SPECIFIER: "OFEM distribution developer ID"
    dependencies:
      - package: OfemKit
      - target: OneLakeFileProvider
        embed: true
        codeSign: true
  OneLakeFileProvider:
    type: app-extension
    platform: macOS
    sources:
      - path: OneLakeFileProvider
        excludes:
          - "**/*.xcconfig"
          - "**/Info.plist"
          - "**/*.entitlements"
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.debruyn.ofem.fileprovider
        PRODUCT_NAME: OneLakeFileProvider
        INFOPLIST_FILE: OneLakeFileProvider/Info.plist
        CODE_SIGN_ENTITLEMENTS: OneLakeFileProvider/OneLakeFileProvider.entitlements
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          PROVISIONING_PROFILE_SPECIFIER: "OFEM FP distribution developer ID"
    dependencies:
      - package: OfemKit
  # Host-app unit-test bundle: compiles host-app non-UI source files for
  # testing pure logic (write fence, icon state, mount-path helper, sign-in
  # coordinator, domain identifier composition). Runs unsigned in CI.
  # ItemIdentifier tests moved to Packages/OfemKit/Tests (run via swift test).
  OneLakeHostTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: OneLakeHostTests
      - path: OneLake
        excludes:
          - "**/*.xcconfig"
          - "**/Info.plist"
          - "**/Assets.xcassets"
          - "**/*.entitlements"
          # OneLakeApp.swift carries @main which is invalid in a test bundle
          # (a bundle module cannot have an entry point). Exclude it so the
          # host-logic tests compile without the SwiftUI App entry point.
          - "OneLakeApp.swift"
      - path: Shared
    dependencies:
      - package: OfemKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.debruyn.ofem.host-tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
  # FPE unit-test bundle: compiles FPE source files + Shared/ so the callback
  # logic (error mapping, anchor encode/decode, engine lifecycle, XPC service)
  # can be tested without a live fileproviderd or a real OfemEngine.
  # @testable import OneLakeFileProviderTests is used inside the test files.
  OneLakeFileProviderTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: OneLakeFileProviderTests
      - path: OneLakeFileProvider
        excludes:
          - "**/*.xcconfig"
          - "**/Info.plist"
          - "**/*.entitlements"
      - path: Shared
    dependencies:
      - package: OfemKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.debruyn.ofem.fpe-tests
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGNING_ALLOWED: NO
schemes:
  OneLake:
    build:
      targets:
        OneLake: all
    test:
      targets:
        - OneLakeHostTests
        - OneLakeFileProviderTests
  OneLakeHostTests:
    build:
      targets:
        OneLakeHostTests: all
    test:
      targets:
        - OneLakeHostTests
  OneLakeFileProviderTests:
    build:
      targets:
        OneLakeFileProviderTests: all
    test:
      targets:
        - OneLakeFileProviderTests
