# Release workflow — triggered on stable CalVer tags (vYYYY.MM.PATCH, no pre-release suffix).
#
# Required GitHub Secrets (add under Settings > Secrets and variables > Actions):
#
#   APPLE_CERT_P12                Base64-encoded Developer ID Application .p12 certificate bundle.
#                                 Export from Keychain Access: right-click certificate > Export > .p12.
#                                 Encode: base64 -i cert.p12 | pbcopy
#   APPLE_CERT_PASSWORD           Password chosen when exporting the .p12.
#   APPLE_TEAM_ID                 Apple Developer Team ID.
#                                 Find it at developer.apple.com/account > Membership.
#   APPLE_API_KEY_JSON            App Store Connect API key as a JSON file with fields:
#                                   { "key_id": "...", "issuer_id": "...", "key": "-----BEGIN EC PRIVATE KEY-----\n..." }
#                                 Used by notarytool. Generate at appstoreconnect.apple.com/access/integrations/api.
#                                 Encode the full file content as the secret value (plain JSON, NOT base64).
#   APPLE_API_KEY_ID              The 10-character key identifier, also present inside APPLE_API_KEY_JSON.
#   APPLE_API_ISSUER_ID           The issuer UUID, also present inside APPLE_API_KEY_JSON.
#   APPLE_PROVISION_PROFILE_APP   Base64-encoded Developer ID provisioning profile for the host app
#                                 (bundle ID dev.debruyn.ofem). Required by xcodebuild manual signing.
#   APPLE_PROVISION_PROFILE_FP    Base64-encoded Developer ID provisioning profile for the File Provider
#                                 Extension (bundle ID dev.debruyn.ofem.fileprovider). Required by xcodebuild.
#   HOMEBREW_TAP_GH_TOKEN         Fine-grained GitHub PAT with Contents: write on sdebruyn/homebrew-ofem.
#                                 Used by the `Update Homebrew cask` step to commit the full-app cask (ofem).

name: Release

# Triggered on a CalVer tag for a real release, or manually
# (workflow_dispatch) for a signing DRY RUN. The dry run exercises the
# full archive → exportArchive (Developer ID) → codesign → DMG path with
# the real certificate, but stops short of notarize/staple and publishes
# nothing — so Swift or signing regressions surface off-tag instead of
# mid-release.
on:
  push:
    tags:
      # Match stable CalVer tags only (vYYYY.MM.PATCH). The glob intentionally
      # excludes pre-release suffixes like -rc.1 or -beta.2 — those are
      # downloaded directly from the Releases page and never pushed to the
      # stable Homebrew tap. See docs/packaging-homebrew.md.
      - "v[0-9][0-9][0-9][0-9].[0-9]*.[0-9]+"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Build, sign, notarize, and staple OneLake.app; produce the DMG;
  # upload it to the GitHub Release; bump the Homebrew cask in the
  # homebrew-ofem tap. Runs on a real macOS arm64 runner so xcodebuild,
  # codesign and notarytool work natively.
  build-app:
    name: Build, sign, notarize and publish app
    runs-on: macos-15
    timeout-minutes: 90
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.3.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Cache Homebrew downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/Library/Caches/Homebrew/downloads
            ~/Library/Caches/Homebrew/api
          key: brew-${{ runner.os }}-release-tools-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: |
            brew-${{ runner.os }}-release-tools-

      - name: Install tools (xcodegen, create-dmg)
        run: brew install xcodegen create-dmg

      # Import the Developer ID Application certificate into a short-lived
      # keychain so codesign can find it without touching the login keychain.
      - name: Import signing certificate
        env:
          APPLE_CERT_P12: ${{ secrets.APPLE_CERT_P12 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$APPLE_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm "$RUNNER_TEMP/cert.p12"

          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      # Write the App Store Connect API key to a file that notarytool can read.
      # Skipped on a dry run, which never notarizes.
      - name: Write notarytool API key
        if: github.event_name != 'workflow_dispatch'
        env:
          APPLE_API_KEY_JSON: ${{ secrets.APPLE_API_KEY_JSON }}
        run: |
          mkdir -p "$RUNNER_TEMP/notary"
          echo "$APPLE_API_KEY_JSON" | jq -r '.key' > "$RUNNER_TEMP/notary/key.p8"
          chmod 600 "$RUNNER_TEMP/notary/key.p8"

      - name: Guard against pre-release tags
        # Belt-and-suspenders check: the tag glob above only matches stable
        # CalVer tags, but an explicit guard here ensures a pre-release tag
        # (e.g. v2026.05.0-rc.1) can never accidentally publish to the stable
        # Homebrew tap even if the glob were widened in the future.
        if: github.event_name != 'workflow_dispatch'
        run: |
          tag="${GITHUB_REF_NAME}"
          if echo "$tag" | grep -qE -- '-'; then
            echo "ERROR: tag '$tag' looks like a pre-release. Aborting to protect the stable tap."
            exit 1
          fi

      - name: Extract version from tag
        id: version
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            # No tag on a manual dry run; synthesise a throwaway CalVer so
            # the bundle version is well-formed. Nothing is published.
            echo "version=0.0.0" >> "$GITHUB_OUTPUT"
          else
            # Strip leading 'v' from the tag to get the CalVer string.
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      # Bootstrap the xcconfig with the real team ID from the secret so
      # xcodebuild can resolve the signing identity. MUST run before
      # `make gen`: xcodegen validates the configFiles referenced
      # in project.yml at generation time, and an absent Local.xcconfig
      # fails the run with "Invalid config file" before the project
      # exists at all.
      - name: Write Local.xcconfig
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cp Local.xcconfig.sample Local.xcconfig
          sed -i '' "s/DEVELOPMENT_TEAM =.*/DEVELOPMENT_TEAM = $APPLE_TEAM_ID/" Local.xcconfig

      - name: Generate Xcode project
        run: make gen

      # Run tests before archiving so we never sign + notarize a broken build.
      # swift test covers the full OfemKit engine suite; make test covers the
      # host-app logic bundle. Both are fast (seconds) relative to the archive.
      - name: Run OfemKit tests
        working-directory: Packages/OfemKit
        run: swift test

      - name: Run host app tests
        run: make test

      # Stage the Developer ID provisioning profiles for the host app
      # and the File Provider Extension so xcodebuild can match them
      # to the respective bundle IDs. Profiles must live in
      # ~/Library/MobileDevice/Provisioning Profiles/ with a
      # <UUID>.provisionprofile filename — xcodebuild keys by UUID.
      - name: Install provisioning profiles
        env:
          APPLE_PROVISION_PROFILE_APP: ${{ secrets.APPLE_PROVISION_PROFILE_APP }}
          APPLE_PROVISION_PROFILE_FP: ${{ secrets.APPLE_PROVISION_PROFILE_FP }}
        run: |
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"

          install_profile() {
            local b64="$1"; local label="$2"
            local tmp
            tmp=$(mktemp)
            echo "$b64" | base64 --decode > "$tmp"
            local uuid
            uuid=$(security cms -D -i "$tmp" | plutil -extract UUID raw -)
            cp "$tmp" "$PROFILES_DIR/${uuid}.provisionprofile"
            rm "$tmp"
            echo "Installed $label as ${uuid}.provisionprofile"
          }

          install_profile "$APPLE_PROVISION_PROFILE_APP" "host app profile"
          install_profile "$APPLE_PROVISION_PROFILE_FP" "fileprovider extension profile"

      - name: Archive (xcodebuild)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Signing settings (Manual, Developer ID cert, per-target
          # provisioning profile) live in project.yml on each
          # target's Release config. xcodebuild's command-line
          # `KEY[bundle.identifier=...]=VALUE` syntax does not parse,
          # so per-target overrides have to be in the project file.
          # -disableAutomaticPackageResolution forces xcodebuild to use the
          # resolved versions from Package.resolved rather than re-resolving
          # to the latest in-range versions. Combined with exact: pins in
          # Package.swift this makes release builds fully reproducible.
          xcodebuild \
            -project OneLake.xcodeproj \
            -scheme OneLake \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -derivedDataPath build/Release \
            -archivePath build/OneLake.xcarchive \
            -disableAutomaticPackageResolution \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$VERSION" \
            archive

      - name: Export archive (Developer ID)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # ExportOptions: manual signing + per-bundle-id profile mapping.
          # The signingCertificate pin keeps Cloud Signing from being
          # tried; the provisioningProfiles dict tells xcodebuild which
          # profile name (from the staged folder) to embed in each
          # signed target.
          /usr/libexec/PlistBuddy \
            -c "Add :method string developer-id" \
            -c "Add :signingStyle string manual" \
            -c "Add :signingCertificate string Developer ID Application" \
            -c "Add :teamID string $APPLE_TEAM_ID" \
            -c "Add :provisioningProfiles dict" \
            -c "Add :provisioningProfiles:dev.debruyn.ofem string OFEM distribution developer ID" \
            -c "Add :provisioningProfiles:dev.debruyn.ofem.fileprovider string OFEM FP distribution developer ID" \
            "$RUNNER_TEMP/ExportOptions.plist"

          xcodebuild \
            -exportArchive \
            -archivePath build/OneLake.xcarchive \
            -exportPath build/Export \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Verify code signature
        # Catch malformed signatures before submitting to Apple — a bad
        # signature only surfaces as a notarization rejection otherwise.
        run: |
          codesign --verify --deep --strict --verbose=2 "build/Export/OneLake.app"

      - name: Notarize app bundle
        # Notarize and staple the .app BEFORE building the DMG so the bundle
        # inside the DMG already carries the embedded ticket. Users who copy the
        # app out of the DMG and launch offline (or behind a firewall) need the
        # embedded ticket — relying solely on Apple's CDN ticket lookup causes a
        # Gatekeeper failure in offline scenarios.
        if: github.event_name != 'workflow_dispatch'
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Zip the .app for submission (notarytool requires a zip or dmg).
          ditto -c -k --sequesterRsrc --keepParent \
            "build/Export/OneLake.app" \
            "$RUNNER_TEMP/OneLake-$VERSION.zip"

          # 45m bound: notarytool service quality is variable; 45m covers
          # the tail of Apple's queue depth on bad days.
          xcrun notarytool submit \
            "$RUNNER_TEMP/OneLake-$VERSION.zip" \
            --key "$RUNNER_TEMP/notary/key.p8" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait \
            --timeout 45m

      - name: Staple app bundle
        if: github.event_name != 'workflow_dispatch'
        run: xcrun stapler staple "build/Export/OneLake.app"

      - name: Create DMG
        # DMG is built after the .app is stapled so the bundle inside
        # the DMG already carries its notarization ticket.
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist-app
          create-dmg \
            --volname "OneLake $VERSION" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "OneLake.app" 175 190 \
            --hide-extension "OneLake.app" \
            --app-drop-link 425 190 \
            "dist-app/OneLake-$VERSION.dmg" \
            "build/Export/OneLake.app"

      - name: Notarize DMG
        if: github.event_name != 'workflow_dispatch'
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          xcrun notarytool submit \
            "dist-app/OneLake-$VERSION.dmg" \
            --key "$RUNNER_TEMP/notary/key.p8" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait \
            --timeout 45m

      - name: Staple DMG
        if: github.event_name != 'workflow_dispatch'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: xcrun stapler staple "dist-app/OneLake-$VERSION.dmg"

      - name: Verify Gatekeeper acceptance
        if: github.event_name != 'workflow_dispatch'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          spctl --assess --type open --context context:primary-signature --verbose "build/Export/OneLake.app"
          spctl --assess --type open --context context:primary-signature --verbose "dist-app/OneLake-$VERSION.dmg"

      - name: Verify Gatekeeper acceptance
        if: github.event_name != 'workflow_dispatch'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          spctl --assess --type open --context context:primary-signature --verbose "build/Export/OneLake.app"
          spctl --assess --type open --context context:primary-signature --verbose "dist-app/OneLake-$VERSION.dmg"

      - name: Compute DMG SHA-256
        id: dmg_sha
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sha=$(shasum -a 256 "dist-app/OneLake-$VERSION.dmg" | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"

      # Upload the DMG to the GitHub Release attached to the tag. Skipped
      # on a dry run, which has no tag/release to attach to. Release
      # notes are auto-generated by GitHub from PR titles and commit
      # subjects since the previous tag (we use Conventional Commits).
      - name: Upload DMG to GitHub Release
        if: github.event_name != 'workflow_dispatch'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: dist-app/OneLake-*.dmg
          fail_on_unmatched_files: true
          generate_release_notes: true

      # Update the Homebrew cask in the homebrew-ofem tap with the new
      # version and the SHA-256 of the freshly notarized DMG. Skipped on
      # a dry run: nothing to publish without a tag.
      - name: Update Homebrew cask
        if: github.event_name != 'workflow_dispatch'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          DMG_SHA256: ${{ steps.dmg_sha.outputs.sha256 }}
          HOMEBREW_TAP_GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GH_TOKEN }}
        run: |
          # Render the cask from the template by substituting placeholders.
          # Escape dots in the sed patterns so they match literals, not wildcards.
          sed \
            -e "s/{{ \.Version }}/$VERSION/g" \
            -e "s/{{ \.DMGSHA256 }}/$DMG_SHA256/g" \
            homebrew/Casks/ofem.rb.tmpl > /tmp/ofem.rb

          # Clone the tap, commit the new cask, push.
          git clone \
            "https://x-access-token:$HOMEBREW_TAP_GH_TOKEN@github.com/sdebruyn/homebrew-ofem.git" \
            /tmp/homebrew-ofem

          mkdir -p /tmp/homebrew-ofem/Casks
          cp /tmp/ofem.rb /tmp/homebrew-ofem/Casks/ofem.rb

          cd /tmp/homebrew-ofem
          git config user.name  "ofem-release-bot"
          git config user.email "noreply@debruyn.dev"
          git add Casks/ofem.rb
          git commit -m "chore(cask): bump ofem to v$VERSION"
          git pull --rebase origin main
          git push

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain" 2>/dev/null || true

      - name: Clean up notary key
        if: always()
        run: rm -f "$RUNNER_TEMP/notary/key.p8"
