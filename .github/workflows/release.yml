# Release workflow — triggered on every CalVer tag (vYYYY.MM.PATCH).
#
# Required GitHub Secrets (add under Settings > Secrets and variables > Actions):
#
#   APPLE_CERT_P12          Base64-encoded Developer ID Application .p12 certificate bundle.
#                           Export from Keychain Access: right-click certificate > Export > .p12.
#                           Encode: base64 -i cert.p12 | pbcopy
#   APPLE_CERT_PASSWORD     Password chosen when exporting the .p12.
#   APPLE_TEAM_ID           Apple Developer Team ID, e.g. 6D79CUWZ4J (Debruyn Consultancy).
#                           Find it at developer.apple.com/account > Membership.
#   APPLE_API_KEY_JSON      App Store Connect API key as a JSON file with fields:
#                             { "key_id": "...", "issuer_id": "...", "key": "-----BEGIN EC PRIVATE KEY-----\n..." }
#                           Used by notarytool. Generate at appstoreconnect.apple.com/access/integrations/api.
#                           Encode the full file content as the secret value (plain JSON, NOT base64).
#   APPLE_API_KEY_ID        The 10-character key identifier, also present inside APPLE_API_KEY_JSON.
#   APPLE_API_ISSUER_ID     The issuer UUID, also present inside APPLE_API_KEY_JSON.
#   HOMEBREW_TAP_GH_TOKEN        Fine-grained GitHub PAT with Contents: write on sdebruyn/homebrew-ofem.
#                           Used by GoReleaser to push the CLI-only cask (ofem-cli) and by
#                           the `Update Homebrew cask` step to commit the full-app cask (ofem).

name: Release

# Triggered on a CalVer tag for a real release, or manually
# (workflow_dispatch) for a signing DRY RUN. The dry run exercises the
# full archive → exportArchive (Developer ID) → codesign → DMG path with
# the real certificate, but stops short of notarize/staple and publishes
# nothing — so Swift or signing regressions surface off-tag instead of
# mid-release. See CODE_REVIEW.md M-8.
on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  GO_VERSION: "1.26.x"

jobs:
  # ---------------------------------------------------------------------------
  # Job A: build, sign, notarize, and staple OneLake.app; produce the DMG.
  # Runs on a real macOS arm64 runner so xcodebuild and codesign work natively.
  # ---------------------------------------------------------------------------
  build-app:
    name: Build, sign, and notarize app
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Cache Homebrew downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/Library/Caches/Homebrew/downloads
            ~/Library/Caches/Homebrew/api
          key: brew-${{ runner.os }}-release-tools-v1

      - name: Install tools (xcodegen, create-dmg)
        run: brew install xcodegen create-dmg

      # Import the Developer ID Application certificate into a short-lived
      # keychain so codesign can find it without touching the login keychain.
      - name: Import signing certificate
        env:
          APPLE_CERT_P12: ${{ secrets.APPLE_CERT_P12 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$APPLE_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm "$RUNNER_TEMP/cert.p12"

          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | tr -d '"')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      # Write the App Store Connect API key to a file that notarytool can read.
      # Skipped on a dry run, which never notarizes.
      - name: Write notarytool API key
        if: github.event_name != 'workflow_dispatch'
        env:
          APPLE_API_KEY_JSON: ${{ secrets.APPLE_API_KEY_JSON }}
        run: |
          mkdir -p "$RUNNER_TEMP/notary"
          echo "$APPLE_API_KEY_JSON" | jq -r '.key' > "$RUNNER_TEMP/notary/key.p8"
          chmod 600 "$RUNNER_TEMP/notary/key.p8"

      - name: Extract version from tag
        id: version
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            # No tag on a manual dry run; synthesise a throwaway CalVer so
            # the bundle version is well-formed. Nothing is published.
            echo "version=0.0.0-dryrun" >> "$GITHUB_OUTPUT"
          else
            # Strip leading 'v' from the tag to get the CalVer string.
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Xcode project
        run: make apple-gen

      # Bootstrap the xcconfig with the real team ID from the secret so
      # xcodebuild can resolve the signing identity.
      - name: Write Local.xcconfig
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cp apple/Local.xcconfig.sample apple/Local.xcconfig
          sed -i '' "s/DEVELOPMENT_TEAM =.*/DEVELOPMENT_TEAM = $APPLE_TEAM_ID/" apple/Local.xcconfig

      - name: Archive (xcodebuild)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild \
            -project apple/OneLake.xcodeproj \
            -scheme OneLake \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -derivedDataPath build/Release \
            -archivePath build/OneLake.xcarchive \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            archive

      - name: Export archive (Developer ID)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Build ExportOptions.plist via PlistBuddy so no shell heredoc
          # quoting rules interfere with the secret value expansion.
          /usr/libexec/PlistBuddy \
            -c "Add :method string developer-id" \
            -c "Add :signingStyle string automatic" \
            -c "Add :teamID string $APPLE_TEAM_ID" \
            "$RUNNER_TEMP/ExportOptions.plist"

          xcodebuild \
            -exportArchive \
            -archivePath build/OneLake.xcarchive \
            -exportPath build/Export \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates

      - name: Build CLI binary (embed in .app)
        env:
          VERSION: ${{ steps.version.outputs.version }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          mkdir -p build/Export/OneLake.app/Contents/Resources/bin
          CGO_ENABLED=0 go build \
            -trimpath \
            -ldflags "-s -w \
              -X github.com/sdebruyn/onelake-explorer-macos/internal/buildinfo.Version=$VERSION \
              -X github.com/sdebruyn/onelake-explorer-macos/internal/buildinfo.Commit=$(git rev-parse --short HEAD) \
              -X github.com/sdebruyn/onelake-explorer-macos/internal/buildinfo.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o build/Export/OneLake.app/Contents/Resources/bin/ofem \
            ./cmd/ofem

          # The CLI binary is added after xcodebuild -exportArchive seals the
          # bundle signature. Sign inside-out per Apple TN3147: binary first,
          # then re-seal the outer .app.
          DEVELOPER_ID="Developer ID Application: Debruyn Consultancy ($APPLE_TEAM_ID)"
          codesign --force --options runtime --timestamp \
            --sign "$DEVELOPER_ID" \
            build/Export/OneLake.app/Contents/Resources/bin/ofem
          codesign --force --options runtime --timestamp \
            --sign "$DEVELOPER_ID" \
            build/Export/OneLake.app

      - name: Create DMG
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          mkdir -p dist-app
          create-dmg \
            --volname "OneLake $VERSION" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "OneLake.app" 175 190 \
            --hide-extension "OneLake.app" \
            --app-drop-link 425 190 \
            "dist-app/OneLake-$VERSION.dmg" \
            "build/Export/OneLake.app"

      - name: Notarize DMG
        if: github.event_name != 'workflow_dispatch'
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          xcrun notarytool submit \
            "dist-app/OneLake-$VERSION.dmg" \
            --key "$RUNNER_TEMP/notary/key.p8" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER_ID" \
            --wait \
            --timeout 15m

      - name: Staple notarization ticket
        if: github.event_name != 'workflow_dispatch'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: xcrun stapler staple "dist-app/OneLake-$VERSION.dmg"

      - name: Compute DMG SHA-256
        id: dmg_sha
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sha=$(shasum -a 256 "dist-app/OneLake-$VERSION.dmg" | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"

      # Upload the DMG as a workflow artifact so the release-cli-and-cask job
      # can pick it up for the cask update step (tag) or so a dry run leaves
      # an inspectable build. The name is keyed on the version output, NOT
      # github.ref_name: on workflow_dispatch ref_name is the branch (e.g.
      # "phase-c/robustness-ci"), and upload-artifact@v4 rejects a name
      # containing "/". The version is slash-free on both triggers.
      - name: Upload DMG artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dmg-${{ steps.version.outputs.version }}
          path: dist-app/OneLake-*.dmg
          retention-days: 7

      # Also upload to the GitHub Release directly so the URL is stable and
      # GoReleaser does not need to know about the file. Skipped on a dry
      # run, which has no tag/release to attach to.
      - name: Upload DMG to GitHub Release
        if: github.event_name != 'workflow_dispatch'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: dist-app/OneLake-*.dmg
          fail_on_unmatched_files: true

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain "$RUNNER_TEMP/build.keychain" 2>/dev/null || true

      - name: Clean up notary key
        if: always()
        run: rm -f "$RUNNER_TEMP/notary/key.p8"

    outputs:
      version: ${{ steps.version.outputs.version }}
      dmg_sha256: ${{ steps.dmg_sha.outputs.sha256 }}

  # ---------------------------------------------------------------------------
  # Job B: compile the CLI tarball via GoReleaser, publish the GitHub Release
  # notes + CLI archive, push ofem-cli cask to homebrew-ofem, and update
  # the full-app cask. Runs on ubuntu-latest (no macOS tools needed here).
  # ---------------------------------------------------------------------------
  release-cli-and-cask:
    name: Publish CLI release and update cask
    runs-on: ubuntu-latest
    needs: build-app
    # Publishing is tag-only. A dry run builds and signs the app but never
    # cuts a CLI release or bumps the cask.
    if: github.event_name != 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # Download the DMG that build-app produced so GoReleaser can attach it
      # to the release via `release.extra_files`.
      - name: Download DMG artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: dmg-${{ needs.build-app.outputs.version }}
          path: dist-app

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GH_TOKEN }}

      # Update the Homebrew cask in the homebrew-ofem tap with the new
      # version and the SHA-256 of the freshly notarized DMG.
      - name: Update Homebrew cask
        env:
          VERSION: ${{ needs.build-app.outputs.version }}
          DMG_SHA256: ${{ needs.build-app.outputs.dmg_sha256 }}
          HOMEBREW_TAP_GH_TOKEN: ${{ secrets.HOMEBREW_TAP_GH_TOKEN }}
        run: |
          # Render the cask from the template by substituting placeholders.
          # Escape dots in the sed patterns so they match literals, not wildcards.
          sed \
            -e "s/{{ \.Version }}/$VERSION/g" \
            -e "s/{{ \.DMGSHA256 }}/$DMG_SHA256/g" \
            homebrew/Casks/ofem.rb.tmpl > /tmp/ofem.rb

          # Clone the tap, commit the new full-app cask, push.
          # `git pull --rebase` before push handles the ofem-cli cask commit
          # that GoReleaser added to the tap in the preceding step.
          git clone \
            "https://x-access-token:$HOMEBREW_TAP_GH_TOKEN@github.com/sdebruyn/homebrew-ofem.git" \
            /tmp/homebrew-ofem

          mkdir -p /tmp/homebrew-ofem/Casks
          cp /tmp/ofem.rb /tmp/homebrew-ofem/Casks/ofem.rb

          cd /tmp/homebrew-ofem
          git config user.name  "ofem-release-bot"
          git config user.email "noreply@debruyn.dev"
          git add Casks/ofem.rb
          git commit -m "chore(cask): bump ofem to v$VERSION"
          git pull --rebase origin main
          git push
