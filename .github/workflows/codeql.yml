name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  security-events: write
  actions: read
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: Analyze (Swift)
    runs-on: macos-15
    # security-and-quality runs a heavier query suite; 90 min ensures SARIF
    # is still uploaded even on a slow runner.
    timeout-minutes: 90
    env:
      DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer
    steps:
      - uses: actions/checkout@v7.0.0

      - name: Assert Xcode 16.4 and Swift 6.1.2 are present
        # Fail fast if the runner image no longer ships Xcode 16.4 rather
        # than silently falling back to a different Xcode version.
        run: |
          set -euo pipefail
          if [ ! -d /Applications/Xcode_16.4.app ]; then
            echo "ERROR: Xcode_16.4.app not found at /Applications/Xcode_16.4.app" >&2
            echo "Available Xcode installations:" >&2
            ls /Applications/Xcode*.app 2>/dev/null || echo "  (none found)" >&2
            exit 1
          fi
          xcodebuild -version
          swift --version

      - name: Cache Homebrew downloads
        uses: actions/cache@v5.0.5
        with:
          path: |
            ~/Library/Caches/Homebrew/downloads
            ~/Library/Caches/Homebrew/api
          # Key on a stable string rather than the workflow file so unrelated
          # edits (cron tweaks, comment changes) don't bust the cache. The
          # restore-key still matches any prior xcodegen entry on this OS.
          key: brew-${{ runner.os }}-xcodegen
          restore-keys: |
            brew-${{ runner.os }}-xcodegen-

      - name: Cache SwiftPM build artifacts
        uses: actions/cache@v5.0.5
        with:
          path: |
            Packages/OfemKit/.build
            DerivedData/SourcePackages
          # Distinct prefix from ci.yml's "spm-" key so the CodeQL tracer's
          # instrumented artifacts never pollute the clean-build cache used
          # by the main CI workflow.
          key: codeql-spm-${{ runner.os }}-${{ hashFiles('Packages/OfemKit/Package.resolved') }}
          restore-keys: |
            codeql-spm-${{ runner.os }}-

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Bootstrap local xcconfig
        # CI has no signing identity; the sample file's placeholder
        # DEVELOPMENT_TEAM is harmless because xcodebuild runs with
        # CODE_SIGNING_ALLOWED=NO via make build-ci.
        run: make bootstrap

      - name: Generate Xcode project
        run: make gen

      - name: Initialize CodeQL
        # Must run AFTER environment setup (Xcode, xcodegen, bootstrap, gen)
        # but BEFORE the actual build so the tracer wraps xcodebuild.
        # build-mode: manual ensures the tracer observes our explicit build
        # step rather than attempting autobuild, which is unreliable for
        # Xcode projects and produces "No source code was seen" errors.
        # security-and-quality enables the full extended query suite for
        # deeper analysis on every PR and every push to main.
        uses: github/codeql-action/init@v3.36.2
        with:
          languages: swift
          build-mode: manual
          queries: security-and-quality

      - name: Build app + extension (under CodeQL tracer)
        # CodeQL's tracer wraps this xcodebuild invocation to extract Swift
        # source files for the database.
        #
        # Use 'generic/platform=macOS' instead of 'platform=macOS,arch=arm64':
        # under the CodeQL DYLD_INSERT_LIBRARIES tracer, the macOS simulator
        # device DB is not initialised and xcodebuild cannot match either
        # arch-specific or name-specific destinations. The generic platform
        # destination bypasses device lookup entirely and works on any
        # GitHub-hosted macOS runner regardless of architecture.
        run: |
          xcodebuild \
            -project OneLake.xcodeproj \
            -scheme OneLake \
            -configuration Debug \
            -destination 'generic/platform=macOS' \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3.36.2
        with:
          category: "/language:swift"
