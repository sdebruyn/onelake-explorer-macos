name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  GO_VERSION: "1.26.x"

jobs:
  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: gofmt check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --config .golangci.yml --timeout 5m

  test:
    name: Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Unit tests
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: coverage.out
          retention-days: 14

      - name: Build CLI
        run: go build -o bin/ofem ./cmd/ofem

      - name: Smoke test
        run: ./bin/ofem --version

  docs-cli:
    name: CLI reference up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Regenerate CLI reference
        run: make docs-cli

      - name: Fail if docs/cli/ or zensical.toml drifted
        run: |
          if ! git diff --exit-code -- docs/cli/ zensical.toml; then
            echo "::error::CLI reference is out of date. Run 'make docs-cli' locally and commit the result."
            exit 1
          fi

  apple-gen:
    name: Apple project generation
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew/downloads
            ~/Library/Caches/Homebrew/api
          key: brew-${{ runner.os }}-xcodegen-v1

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Bootstrap local xcconfig
        # CI has no signing identity yet; the sample file is enough to
        # let xcodegen reference DEVELOPMENT_TEAM without erroring.
        run: make apple-bootstrap

      - name: Generate Xcode project
        run: make apple-gen

      - name: Verify project.pbxproj exists
        run: test -f apple/OneLake.xcodeproj/project.pbxproj

  cgo-build:
    name: cgo bridge archive
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Build libofemcore.a + libofemcore.h
        run: make cgo-build

      - name: Verify archive and header exist
        run: |
          test -f apple/build/cgo/libofemcore.a
          test -f apple/build/cgo/libofemcore.h
          file apple/build/cgo/libofemcore.a | grep -qi 'ar archive'

      - name: Verify exported symbols
        # The cgo //export directives must end up as global text
        # symbols in the archive — otherwise Swift won't be able to
        # link them. Fail loudly if any of the three smoke-API
        # symbols are missing.
        run: |
          symbols=$(nm apple/build/cgo/libofemcore.a 2>/dev/null | grep -E '^[0-9a-f]+ T _ofem_core_' | awk '{print $3}' | sort -u)
          echo "Found exported symbols:"
          echo "$symbols"
          for sym in _ofem_core_version _ofem_core_string_free _ofem_core_log_message; do
            echo "$symbols" | grep -qx "$sym" || { echo "missing symbol: $sym"; exit 1; }
          done

  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install commitlint
        run: npm install --no-save @commitlint/cli @commitlint/config-conventional

      - name: Validate PR commits
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
