name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  GO_VERSION: "1.26.x"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: gofmt check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go mod tidy drift check
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "::error::go.mod or go.sum is out of date. Run 'go mod tidy' locally and commit the result."
            exit 1
          fi

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2
          args: --config .golangci.yml --timeout 5m

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Unit tests
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage floor
        # Enforced floor that ratchets regressions out. Aspirational target
        # is 80%. Raise FLOOR as coverage climbs.
        run: |
          FLOOR=60
          pct=$(go tool cover -func=coverage.out | tail -1 | awk '{print $NF}' | tr -d '%')
          echo "Total coverage: ${pct}% (floor ${FLOOR}%)"
          awk -v p="$pct" -v f="$FLOOR" 'BEGIN { exit (p+0 >= f+0) ? 0 : 1 }' || {
            echo "::error::coverage ${pct}% is below the enforced floor ${FLOOR}%"
            exit 1
          }

      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ github.sha }}
          path: coverage.out
          retention-days: 14

      - name: Build daemon binary
        run: go build -o bin/ofem ./cmd/ofem

      - name: Smoke test
        run: ./bin/ofem --version

  apple-build:
    name: Apple build + smoke tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        # Required because the Xcode postBuildScript runs `go build` to
        # bundle the daemon binary. Xcode's build phase PATH is restricted
        # and does not include the setup-go toolchain directory automatically;
        # we expose GOROOT so the script can resolve go absolutely.
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Cache Homebrew downloads
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/Library/Caches/Homebrew/downloads
            ~/Library/Caches/Homebrew/api
          key: brew-${{ runner.os }}-xcodegen-v1

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Bootstrap local xcconfig
        # CI has no signing identity; the sample file's placeholder
        # DEVELOPMENT_TEAM is harmless because every xcodebuild invocation
        # below disables code signing (CODE_SIGNING_ALLOWED=NO).
        run: make apple-bootstrap

      - name: Generate Xcode project
        run: make apple-gen

      - name: Verify project.pbxproj exists
        run: test -f apple/OneLake.xcodeproj/project.pbxproj

      - name: Build daemon binary (needed by IPC integration test)
        # IPCIntegrationTests spawns ./bin/ofem against a temp socket and
        # drives it from the real Swift IPCClient. Without this binary the
        # test calls XCTSkip and the regression net loses its biggest
        # hole — that is exactly what shipped #71/#85. Build it first.
        run: go build -o bin/ofem ./cmd/ofem

      - name: Smoke tests (unsigned, host-less)
        # OneLakeTests bundle: File Provider identifier grammar (pure
        # logic) + IPC integration test (spawns the daemon binary built
        # above and round-trips a real status call via IPCClient). Runs
        # before the slower full app build so a Swift-side IPC regression
        # surfaces in seconds.
        run: make apple-test

      - name: Build app + extension (unsigned)
        # Compiles the OneLake app and the File Provider .appex with code
        # signing disabled. Catches Swift compile regressions on every PR
        # so they no longer surface for the first time on a release tag.
        run: make apple-build-ci

  vulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"

      - name: Install commitlint
        run: npm install --no-save @commitlint/cli @commitlint/config-conventional

      - name: Validate PR commits
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
