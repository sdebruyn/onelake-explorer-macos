name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  GO_VERSION: "1.26.x"

jobs:
  lint:
    name: Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: gofmt check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: latest
          args: --config .golangci.yml --timeout 5m

  test:
    name: Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Unit tests
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Coverage floor
        # Enforced floor that ratchets regressions out; the aspirational
        # target is 80% (see PLAN.md). Raise FLOOR as coverage climbs —
        # notably after the cgo bridge is removed, which lifts the total.
        run: |
          FLOOR=60
          pct=$(go tool cover -func=coverage.out | tail -1 | awk '{print $NF}' | tr -d '%')
          echo "Total coverage: ${pct}% (floor ${FLOOR}%)"
          awk -v p="$pct" -v f="$FLOOR" 'BEGIN { exit (p+0 >= f+0) ? 0 : 1 }' || {
            echo "::error::coverage ${pct}% is below the enforced floor ${FLOOR}%"
            exit 1
          }

      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ github.sha }}
          path: coverage.out
          retention-days: 14

      - name: Build CLI
        run: go build -o bin/ofem ./cmd/ofem

      - name: Smoke test
        run: ./bin/ofem --version

  docs-cli:
    name: CLI reference up to date
    # Line-ending reproducibility note: the generator reads zensical.toml
    # with os.ReadFile and emits the nav block with bare "\n". A Windows
    # checkout with core.autocrlf=true would mix CRLF with LF and trip
    # the diff guard below, but OFEM is macOS-only (see CLAUDE.md hard
    # constraints + README) so Windows is not a supported dev environment.
    # CI itself runs on Linux/macOS, so LF stays LF end-to-end.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Regenerate CLI reference
        run: make docs-cli

      - name: Fail if docs/cli/ or zensical.toml drifted
        run: |
          if ! git diff --exit-code -- docs/cli/ zensical.toml; then
            echo "::error::CLI reference is out of date. Run 'make docs-cli' locally and commit the result."
            exit 1
          fi

  apple-build:
    name: Apple build + smoke tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Cache Homebrew downloads
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/Library/Caches/Homebrew/downloads
            ~/Library/Caches/Homebrew/api
          key: brew-${{ runner.os }}-xcodegen-v1

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Bootstrap local xcconfig
        # CI has no signing identity; the sample file's placeholder
        # DEVELOPMENT_TEAM is harmless because every xcodebuild invocation
        # below disables code signing (CODE_SIGNING_ALLOWED=NO).
        run: make apple-bootstrap

      - name: Generate Xcode project
        run: make apple-gen

      - name: Verify project.pbxproj exists
        run: test -f apple/OneLake.xcodeproj/project.pbxproj

      - name: Smoke tests (unsigned, host-less)
        # Pure logic tests of the File Provider identifier grammar. Runs
        # first because it is fast and catches the most common Swift
        # regressions before the slower full app build.
        run: make apple-test

      - name: Build app + extension (unsigned)
        # Compiles the OneLake app and the File Provider .appex with code
        # signing disabled. Catches Swift compile regressions on every PR
        # so they no longer surface for the first time on a release tag.
        # See CODE_REVIEW.md M-8.
        run: make apple-build-ci

  vulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  commitlint:
    name: Commitlint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"

      - name: Install commitlint
        run: npm install --no-save @commitlint/cli @commitlint/config-conventional

      - name: Validate PR commits
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
