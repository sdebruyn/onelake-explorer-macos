# Issue and PR labels for OFE. Seed via scripts/seed-labels.sh which uses gh.
# Keep this list small and meaningful — labels that are never used add noise.

# Type — what kind of issue/PR is this.
- name: "type:bug"
  color: "d73a4a"
  description: "Something is not working"
- name: "type:feature"
  color: "0e8a16"
  description: "A new feature or enhancement"
- name: "type:docs"
  color: "0075ca"
  description: "Documentation only"
- name: "type:chore"
  color: "bfd4f2"
  description: "Maintenance, refactor, tooling"
- name: "type:question"
  color: "d876e3"
  description: "A question that does not require code changes"

# Area — which part of the codebase.
- name: "area:auth"
  color: "fbca04"
  description: "internal/auth — MSAL, Keychain, account registry"
- name: "area:onelake"
  color: "fbca04"
  description: "internal/onelake — DFS / ADLS Gen2 client"
- name: "area:fabric"
  color: "fbca04"
  description: "internal/fabric — Fabric REST client"
- name: "area:file-provider"
  color: "fbca04"
  description: "Swift File Provider Extension and host app"
- name: "area:cli"
  color: "fbca04"
  description: "cmd/ofe — the command-line tool"
- name: "area:daemon"
  color: "fbca04"
  description: "Background daemon, LaunchAgent, IPC"
- name: "area:cache"
  color: "fbca04"
  description: "internal/cache — local SQLite + blob cache"
- name: "area:telemetry"
  color: "fbca04"
  description: "internal/telemetry — App Insights, install ID, redaction"
- name: "area:packaging"
  color: "fbca04"
  description: "Homebrew, signing, notarization, release pipeline"
- name: "area:ci"
  color: "fbca04"
  description: "GitHub Actions, linting, build tooling"

# Priority — used sparingly; default is none.
- name: "prio:high"
  color: "b60205"
  description: "Should be addressed soon"
- name: "prio:low"
  color: "c2e0c6"
  description: "Nice to have, no specific deadline"

# Status — process state.
- name: "status:blocked"
  color: "e99695"
  description: "Cannot move forward — see comments for the blocker"
- name: "status:in-progress"
  color: "fef2c0"
  description: "Someone is actively working on this"
- name: "status:needs-info"
  color: "f9d0c4"
  description: "Waiting on more information from the reporter"

# Lifecycle.
- name: "good first issue"
  color: "7057ff"
  description: "A welcoming entry point for new contributors"
- name: "help wanted"
  color: "008672"
  description: "Maintainer is open to outside help on this one"
- name: "duplicate"
  color: "cfd3d7"
  description: "Already reported elsewhere"
- name: "wontfix"
  color: "ffffff"
  description: "Intentionally not pursuing"

# Dependencies.
- name: "dependencies"
  color: "0366d6"
  description: "Updates to third-party dependencies"
