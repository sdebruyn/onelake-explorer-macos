version: 2
updates:
  # Swift Package Manager dependencies — MSAL, GRDB, TOMLKit.
  # Keeps security patches (especially MSAL, the auth library) arriving via PR
  # rather than requiring manual bumps.
  - package-ecosystem: swift
    directory: "/Packages/OfemKit"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions — keeps the SHA-pinned `uses:` entries current (and
  # updates the trailing `# vX.Y.Z` version comment) so pinning to a SHA
  # does not mean silently running stale, unpatched actions.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
