version: 2
updates:
  # Swift Package Manager dependencies — MSAL, GRDB, TOMLKit.
  # Keeps security patches (especially MSAL, the auth library) arriving via PR
  # rather than requiring manual bumps.
  # Group all SPM updates into a single PR: Package.swift and Package.resolved
  # must move together (exact: pins), so separate PRs can land one file without
  # the other and break the build.
  - package-ecosystem: swift
    directory: "/Packages/OfemKit"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      swift-packages:
        patterns:
          - "*"

  # GitHub Actions — keeps the version-tag-pinned `uses:` entries current
  # so the workflows do not silently run stale, unpatched actions.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        patterns:
          - "*"
