# SwiftLint configuration for OFEM (OneLake Explorer for macOS)
# Tool: realm/SwiftLint 0.63.3
#
# Philosophy: enforce correctness and clarity; skip purely stylistic rules
# that SwiftFormat already handles (whitespace, brace position, trailing
# commas are autocorrected below so the tree stays clean).

# Excluded paths — build artefacts, generated project, vendored deps.
excluded:
  - .build
  - DerivedData
  - Packages/OfemKit/.build
  - OneLake.xcodeproj

# ── Rules ────────────────────────────────────────────────────────────────────

# Disable rules that are too noisy or conflict with this codebase's patterns.
disabled_rules:
  # Stylistic: fully managed by SwiftFormat — disabling here prevents the two
  # tools from fighting each other (SwiftLint autocorrect would produce a tree
  # that SwiftFormat immediately reformats back, and vice versa).
  - trailing_comma        # SwiftFormat: trailingCommas
  - opening_brace         # SwiftFormat: wrapMultilineStatementBraces
  - statement_position    # SwiftFormat: elseOnSameLine
  - implicit_optional_initialization
  - static_over_final_class

# Opt-in rules that add real value for this codebase.
# force_cast and force_try are default-enabled in SwiftLint; they are
# omitted here because listing them under opt_in_rules is redundant.
opt_in_rules:
  - non_optional_string_data_conversion
  # Correctness: an unguarded force-unwrap that traps faults the Finder mount
  # (the FPE process dies, macOS shows the volume as unavailable). `error`
  # severity so a regression fails CI, not just a local warning.
  - force_unwrapping

# ── Rule configuration ────────────────────────────────────────────────────────

identifier_name:
  # Allow short names common in closures, result builders, and test helpers
  # (e.g. `n`, `c`, `r`, `a`, `b`, `id`). Single-character names that are
  # truly ambiguous will still be flagged when used outside those contexts.
  min_length:
    warning: 1
    error: 1
  max_length:
    warning: 60
    error: 80
  # Allow common short Swift identifiers.
  allowed_symbols: ["_"]
  validates_start_with_lowercase: warning

type_name:
  min_length:
    warning: 1
    error: 1
  max_length:
    warning: 60
    error: 80

line_length:
  warning: 160
  error: 240
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 600
  error: 1150

type_body_length:
  warning: 400
  error: 700

function_body_length:
  warning: 60
  error: 100

cyclomatic_complexity:
  warning: 12
  error: 20

function_parameter_count:
  warning: 6
  error: 8

large_tuple:
  warning: 3
  error: 4

force_unwrapping:
  severity: error   # WITHOUT this it defaults to warning and never blocks CI

