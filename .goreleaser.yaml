# GoReleaser config for the ofem CLI binary part of the release.
#
# The signed/notarized .app and its Homebrew cask are produced by a
# separate workflow step (see docs/packaging-homebrew.md) that runs
# xcodebuild + codesign + notarytool + create-dmg. GoReleaser attaches
# the resulting DMG to the GitHub Release via `release.extra_files`.
#
# Split build model:
#   - Job A (macos-15): builds, signs, notarizes, and staples the DMG;
#     uploads it to the GitHub Release as an extra artifact, then updates
#     the Homebrew cask in the homebrew-ofem tap.
#   - Job B (ubuntu-latest): runs GoReleaser to compile the standalone CLI
#     tarball, attach checksums, and publish the GitHub Release notes.
#     The Homebrew cask (Casks/ofem.rb) is pushed by a separate workflow step.
version: 2

project_name: ofem

before:
  hooks:
    - go mod tidy

builds:
  - id: ofem
    main: ./cmd/ofem
    binary: ofem
    env:
      # CGO is disabled for the standalone CLI archive. The cgo bridge
      # (libofemcore.a) is only needed by the Swift host app; the pure-Go
      # CLI does not link against it at release time.
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/sdebruyn/onelake-explorer-macos/internal/buildinfo.Version={{ .Version }}
      - -X github.com/sdebruyn/onelake-explorer-macos/internal/buildinfo.Commit={{ .Commit }}
      - -X github.com/sdebruyn/onelake-explorer-macos/internal/buildinfo.Date={{ .Date }}

archives:
  - id: ofem-cli
    ids:
      - ofem
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: git
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: CI / build
      regexp: '^.*?(ci|build)(\([[:word:]]+\))??!?:.+$'
      order: 3
  filters:
    exclude:
      - '^docs(\(.*\))?:'
      - '^test(\(.*\))?:'
      - '^chore(\(.*\))?:'
      - '^style(\(.*\))?:'
      - '^refactor(\(.*\))?:'
      - 'merge conflict'

release:
  github:
    owner: sdebruyn
    name: onelake-explorer-macos
  # Tags with a hyphen (e.g. v2026.05.0-rc.1) are automatically marked
  # as pre-releases; stable CalVer tags are marked as releases.
  prerelease: auto
  draft: false
  # The .app DMG is produced by the build-app workflow job. The glob
  # picks it up once the job uploads it to dist-app/ before GoReleaser runs.
  extra_files:
    - glob: ./dist-app/OneLake-*.dmg

# The Homebrew cask is a single cask (Casks/ofem.rb) that ships the full
# .app DMG. It is rendered from homebrew/Casks/ofem.rb.tmpl and committed
# to sdebruyn/homebrew-ofem by the `Update Homebrew cask` step in the
# release workflow after the DMG SHA-256 is known. GoReleaser does not
# manage the cask because it does not build the .app.
