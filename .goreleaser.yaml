# GoReleaser config for the ofem CLI binary part of the release.
#
# The signed/notarized .app and its Homebrew cask are produced by a
# separate workflow step (see docs/packaging-homebrew.md) that runs
# xcodebuild + codesign + notarytool + create-dmg. GoReleaser attaches
# the resulting DMG to the GitHub Release via `release.extra_files`.
version: 2

project_name: ofem

before:
  hooks:
    - go mod tidy

builds:
  - id: ofem-cli
    main: ./cmd/ofem
    binary: ofem
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/sdebruyn/onelake-explorer-macos/internal/buildinfo.Version={{.Version}}
      - -X github.com/sdebruyn/onelake-explorer-macos/internal/buildinfo.Commit={{.ShortCommit}}
      - -X github.com/sdebruyn/onelake-explorer-macos/internal/buildinfo.Date={{.Date}}
      - -X github.com/sdebruyn/onelake-explorer-macos/internal/buildinfo.AppInsightsConnString={{.Env.OFEM_APPINSIGHTS_CONNSTRING}}

archives:
  - id: ofem-cli
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: git
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: CI / build
      regexp: '^.*?(ci|build)(\([[:word:]]+\))??!?:.+$'
      order: 3
  filters:
    exclude:
      - '^docs(\(.*\))?:'
      - '^test(\(.*\))?:'
      - '^chore(\(.*\))?:'
      - '^style(\(.*\))?:'
      - '^refactor(\(.*\))?:'
      - 'merge conflict'

release:
  github:
    owner: sdebruyn
    name: onelake-explorer-macos
  prerelease: auto
  draft: false
  # The .app DMG is built by the workflow step that runs xcodebuild +
  # codesign + notarytool. The glob below picks it up at release time.
  extra_files:
    - glob: ./dist-app/OneLake-*.dmg

brews:
  - name: ofem
    description: OneLake File Explorer CLI for macOS
    homepage: https://github.com/sdebruyn/onelake-explorer-macos
    license: MIT
    repository:
      owner: sdebruyn
      name: homebrew-ofem
      token: "{{ .Env.HOMEBREW_TAP_GH_TOKEN }}"
    directory: Formula
    commit_author:
      name: ofem-release-bot
      email: noreply@github.com
    install: |
      bin.install "ofem"
    test: |
      system "#{bin}/ofem", "--version"

# Note: the cask for the full .app is NOT generated by GoReleaser. It lives
# directly in the homebrew-ofem tap and is updated by the release workflow
# after the .app has been signed and notarized. See docs/packaging-homebrew.md.
