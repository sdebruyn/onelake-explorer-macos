# GoReleaser config for the ofem CLI binary part of the release.
#
# The signed/notarized .app and its Homebrew cask are produced by a
# separate workflow step (see docs/packaging-homebrew.md) that runs
# xcodebuild + codesign + notarytool + create-dmg. GoReleaser attaches
# the resulting DMG to the GitHub Release via `release.extra_files`.
#
# Split build model:
#   - Job A (macos-15): builds, signs, notarizes, and staples the DMG;
#     uploads it to the GitHub Release as an extra artifact, then updates
#     the Homebrew cask in the homebrew-ofem tap.
#   - Job B (ubuntu-latest): runs GoReleaser to compile the standalone CLI
#     tarball, attach checksums, publish the GitHub Release notes, and push
#     the ofem-cli Cask entry to the tap. The full-app cask (Casks/ofem.rb)
#     is pushed by a separate workflow step after the DMG SHA-256 is known.
version: 2

project_name: ofem

before:
  hooks:
    - go mod tidy

builds:
  - id: ofem
    main: ./cmd/ofem
    binary: ofem
    env:
      # CGO is disabled for the standalone CLI archive. The cgo bridge
      # (libofemcore.a) is only needed by the Swift host app; the pure-Go
      # CLI does not link against it at release time.
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/sdebruyn/onelake-explorer-macos/internal/buildinfo.Version={{ .Version }}
      - -X github.com/sdebruyn/onelake-explorer-macos/internal/buildinfo.Commit={{ .Commit }}
      - -X github.com/sdebruyn/onelake-explorer-macos/internal/buildinfo.Date={{ .Date }}

archives:
  - id: ofem-cli
    ids:
      - ofem
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: git
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\([[:word:]]+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\([[:word:]]+\))??!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\([[:word:]]+\))??!?:.+$'
      order: 2
    - title: CI / build
      regexp: '^.*?(ci|build)(\([[:word:]]+\))??!?:.+$'
      order: 3
  filters:
    exclude:
      - '^docs(\(.*\))?:'
      - '^test(\(.*\))?:'
      - '^chore(\(.*\))?:'
      - '^style(\(.*\))?:'
      - '^refactor(\(.*\))?:'
      - 'merge conflict'

release:
  github:
    owner: sdebruyn
    name: onelake-explorer-macos
  # Tags with a hyphen (e.g. v2026.05.0-rc.1) are automatically marked
  # as pre-releases; stable CalVer tags are marked as releases.
  prerelease: auto
  draft: false
  # The .app DMG is produced by the build-app workflow job. The glob
  # picks it up once the job uploads it to dist-app/ before GoReleaser runs.
  extra_files:
    - glob: ./dist-app/OneLake-*.dmg

# Publish the standalone CLI entry to sdebruyn/homebrew-ofem.
# homebrew_casks wraps the darwin/arm64 CLI tarball produced above,
# letting users run `brew install sdebruyn/ofem/ofem-cli` to get only
# the CLI binary without the full .app.
# The main Homebrew *cask* (Casks/ofem.rb) installs the full .app DMG
# and is managed separately: rendered from homebrew/Casks/ofem.rb.tmpl
# and pushed to the tap by the `Update Homebrew cask` workflow step after
# the DMG SHA-256 is known — GoReleaser does not manage the .app cask.
homebrew_casks:
  - name: ofem-cli
    ids:
      - ofem-cli
    repository:
      owner: sdebruyn
      name: homebrew-ofem
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GH_TOKEN }}"
      pull_request:
        enabled: false
    commit_author:
      name: ofem-release-bot
      email: noreply@debruyn.dev
    commit_msg_template: "chore(cask): bump ofem-cli to v{{ .Version }}"
    directory: Casks
    url:
      verified: github.com/sdebruyn/onelake-explorer-macos
    homepage: "https://ofem.debruyn.dev"
    description: "Browse Microsoft Fabric OneLake from the macOS Finder (CLI only)"
    license: "MIT"
    # Only stable CalVer tags (no hyphen) get pushed to the tap.
    # Pre-release tags (e.g. v2026.05.0-rc.1) are skipped.
    skip_upload: auto
