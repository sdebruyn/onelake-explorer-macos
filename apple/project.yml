name: OneLake
options:
  bundleIdPrefix: dev.debruyn.ofem
  deploymentTarget:
    macOS: "14.0"
  groupSortPosition: top
  generateEmptyDirectories: true
fileGroups:
  - apple/Local.xcconfig.sample
configs:
  Debug: debug
  Release: release
configFiles:
  Debug: apple/Local.xcconfig
  Release: apple/Local.xcconfig
settings:
  base:
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: YES
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    GENERATE_INFOPLIST_FILE: NO
    # Xcode 16+ splits Debug builds into a separate `.debug.dylib` for
    # SwiftUI previews. A sandboxed File Provider Extension runs with
    # hardened runtime + library validation, which refuses to load that
    # externally-signed dylib — the extension then never launches and
    # macOS reports the domain as "Sync is not enabled" (FP -2011). We
    # don't use previews, so disable the split for every configuration.
    ENABLE_DEBUG_DYLIB: NO
# Settings shared by both the host app and the File Provider Extension
# so they pick up libofemcore.a and the matching bridging header from
# apple/build/cgo/ (produced by `make cgo-build`).
#
# - LIBRARY_SEARCH_PATHS / HEADER_SEARCH_PATHS point at the generated
#   archive + header.
# - OTHER_LDFLAGS pulls libofemcore in plus the system frameworks the
#   Go core's stdlib transitively needs (Security for crypto and
#   CoreFoundation for runtime).
# - SWIFT_OBJC_BRIDGING_HEADER references the per-target bridging
#   header file in each target's source folder; the bridging header
#   itself just re-exports libofemcore.h.
settingGroups:
  cgoBridge:
    LIBRARY_SEARCH_PATHS:
      - $(SRCROOT)/build/cgo
    HEADER_SEARCH_PATHS:
      - $(SRCROOT)/build/cgo
    OTHER_LDFLAGS:
      - -lofemcore
      - -framework
      - Security
      - -framework
      - CoreFoundation
targets:
  OneLake:
    type: application
    platform: macOS
    sources:
      - path: apple/OneLake
        excludes:
          - "**/*.xcconfig"
          - "**/Info.plist"
          - "**/*.entitlements"
    settings:
      groups:
        - cgoBridge
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.debruyn.ofem
        PRODUCT_NAME: OneLake
        INFOPLIST_FILE: OneLake/Info.plist
        CODE_SIGN_ENTITLEMENTS: OneLake/OneLake.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_OBJC_BRIDGING_HEADER: OneLake/OneLakeCoreBridge.h
    dependencies:
      - target: OneLakeFileProvider
        embed: true
        codeSign: true
  OneLakeFileProvider:
    type: app-extension
    platform: macOS
    sources:
      - path: apple/OneLakeFileProvider
        excludes:
          - "**/*.xcconfig"
          - "**/Info.plist"
          - "**/*.entitlements"
    settings:
      groups:
        - cgoBridge
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.debruyn.ofem.fileprovider
        PRODUCT_NAME: OneLakeFileProvider
        INFOPLIST_FILE: OneLakeFileProvider/Info.plist
        CODE_SIGN_ENTITLEMENTS: OneLakeFileProvider/OneLakeFileProvider.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: OneLakeFileProvider/OneLakeFileProviderCoreBridge.h
