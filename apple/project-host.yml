# Host-app-only XcodeGen spec.
#
# A trimmed copy of project.yml that omits the OneLakeFileProvider
# target and the embed-extension dependency on the OneLake target. The
# only reason this exists is to let contributors on a free Apple ID
# (Personal Team) smoke-test the cgo bridge — Personal Teams cannot
# sign macOS app extensions, so a full `make apple-build` fails on the
# extension target before the host app is ever built.
#
# Build with `make apple-build-host`. The generated project lives at
# apple/OneLakeHost.xcodeproj and is gitignored. Drop this file once
# every contributor has a paid Apple Developer Program account.
name: OneLakeHost
options:
  bundleIdPrefix: dev.debruyn.ofem
  deploymentTarget:
    macOS: "14.0"
  groupSortPosition: top
  generateEmptyDirectories: true
fileGroups:
  - apple/Local.xcconfig.sample
configs:
  Debug: debug
  Release: release
configFiles:
  Debug: apple/Local.xcconfig
  Release: apple/Local.xcconfig
settings:
  base:
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: YES
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    GENERATE_INFOPLIST_FILE: NO
settingGroups:
  cgoBridge:
    LIBRARY_SEARCH_PATHS:
      - $(SRCROOT)/build/cgo
    HEADER_SEARCH_PATHS:
      - $(SRCROOT)/build/cgo
    OTHER_LDFLAGS:
      - -lofemcore
      - -framework
      - Security
      - -framework
      - CoreFoundation
targets:
  OneLake:
    type: application
    platform: macOS
    sources:
      - path: apple/OneLake
        excludes:
          - "**/*.xcconfig"
          - "**/Info.plist"
          - "**/*.entitlements"
    settings:
      groups:
        - cgoBridge
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.debruyn.ofem
        PRODUCT_NAME: OneLake
        INFOPLIST_FILE: OneLake/Info.plist
        CODE_SIGN_ENTITLEMENTS: OneLake/OneLake.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_OBJC_BRIDGING_HEADER: OneLake/OneLakeCoreBridge.h
