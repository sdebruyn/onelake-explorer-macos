[project]
site_dir = "docs_build/site"
site_name = "OneLake File Explorer for macOS"
site_description = "OneLake in Finder on macOS — multi-account, multi-tenant, open source."
site_url = "https://ofem.debruyn.dev"
site_author = "Sam Debruyn"
repo_url = "https://github.com/sdebruyn/onelake-explorer-macos"
repo_name = "sdebruyn/onelake-explorer-macos"
edit_uri = "edit/main/docs/"
copyright = """
Microsoft, Microsoft Fabric, OneLake and macOS are trademarks of their respective owners.
This project is not affiliated with Microsoft or Apple.
"""

watch = ["README.md", "PLAN.md", "CONTRIBUTING.md"]

nav = [
  { "Home" = [
    { "Overview" = "index.md" },
    { "Install" = "install.md" },
    { "Sign in" = "sign-in.md" },
    { "Use in Finder" = "use.md" },
    { "Privacy & telemetry" = "privacy.md" },
    { "Uninstall" = "uninstall.md" },
    { "Support" = "support.md" },
  ] },
  { "Architecture & design" = [
    { "Overview" = "design/overview.md" },
    { "macOS integration — File Provider vs alternatives" = "macos-mount.md" },
    { "File Provider Extension" = "file-provider.md" },
    { "Authentication" = "auth.md" },
    { "OneLake & Fabric APIs" = "onelake-api.md" },
    { "Telemetry design" = "telemetry.md" },
    { "Tech stack" = "tech-stack.md" },
    { "Packaging & releases" = "packaging-homebrew.md" },
  ] },
  { "Background" = [
    { "Reference: Windows File Explorer" = "onelake-file-explorer-windows.md" },
    { "Prior art" = "prior-art.md" },
    { "Telemetry hosting research" = "telemetry-hosting-research.md" },
  ] },
  { "Contributing" = [
    { "How to contribute" = "design/contributing.md" },
    { "Prerequisites" = "prerequisites.md" },
    { "Roadmap" = "design/roadmap.md" },
  ] },
]

[project.theme]
custom_dir = "overrides"
language = "en"
features = [
  "content.action.edit",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tooltips",
  "navigation.footer",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "navigation.path",
  "navigation.sections",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "search.suggest",
]

[project.theme.icon]
logo = "material/cloud-outline"
repo = "fontawesome/brands/github"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "teal"
accent = "light green"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "teal"
accent = "light green"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[project.extra.analytics]
provider = "custom"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/sdebruyn/onelake-explorer-macos"

[[project.extra.social]]
icon = "fontawesome/brands/linkedin"
link = "https://www.linkedin.com/in/samueldebruyn/"

[[project.extra.social]]
icon = "fontawesome/brands/x-twitter"
link = "https://x.com/s_debruyn"

[[project.extra.social]]
icon = "fontawesome/solid/globe"
link = "https://debruyn.dev"

[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.snippets]
check_paths = true
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
