parent_config:
  file: ../../../.swiftlint.yml

disabled_rules:
  - force_unwrapping   # test stubs legitimately force-unwrap known-good literals
                        # (HTTPURLResponse/Data); a crash here fails the test, it
                        # does not fault the live Finder mount.

# file_length and type_body_length are re-enabled now that SyncEngineTests.swift
# has been split by family. Thresholds are set to clear the current binding files:
#   file_length     — DomainItemTests.swift at 1290 lines (struct at line 9)
#   type_body_length — DomainItemTests struct body at ~1281 lines
# Neither threshold applies to extension bodies (only struct/class/enum).
# DomainItemTests.swift is out of scope for this PR; thresholds leave headroom.
file_length:
  warning: 1300
  error: 1400

type_body_length:
  warning: 1300
  error: 1400
